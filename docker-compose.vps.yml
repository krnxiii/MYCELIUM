# MYCELIUM VPS deployment
# Usage: docker compose -f docker-compose.vps.yml up -d
# Prereq: .env with auth token, Neo4j password, embeddings config
# Network: Tailscale mesh VPN (no public ports except Neo4j/MCP on tailscale IP)

name: mycelium-vps

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: mycelium-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: ${MYCELIUM_NEO4J__USER:-neo4j}/${MYCELIUM_NEO4J__PASSWORD:-password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "512m"
      NEO4J_server_memory_pagecache_size: "256m"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_auth__minimum__password__length: "1"
    volumes:
      - ${MYCELIUM_DATA_DIR:-~/.mycelium}/neo4j/data:/data
      - ${MYCELIUM_DATA_DIR:-~/.mycelium}/neo4j/logs:/logs
      - ${MYCELIUM_DATA_DIR:-~/.mycelium}/neo4j/plugins:/var/lib/neo4j/plugins
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${MYCELIUM_NEO4J__USER:-neo4j} -p ${MYCELIUM_NEO4J__PASSWORD:-password} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  mycelium:
    build: .
    container_name: mycelium-app
    ports:
      - "9631:9631"
      - "9633:9633"
    environment:
      MYCELIUM_NEO4J__URI: bolt://neo4j:7687
      MYCELIUM_NEO4J__PASSWORD: ${MYCELIUM_NEO4J__PASSWORD:-password}
      MYCELIUM_SEMANTIC__PROVIDER: api
      MYCELIUM_SEMANTIC__API_BASE_URL: ${MYCELIUM_SEMANTIC__API_BASE_URL:-https://api.deepinfra.com/v1/openai}
      MYCELIUM_SEMANTIC__API_KEY: ${MYCELIUM_SEMANTIC__API_KEY:-}
      MYCELIUM_LLM__PROVIDER: ${MYCELIUM_LLM__PROVIDER:-cc-cli}
      MYCELIUM_LLM__MODEL: ${MYCELIUM_LLM__MODEL:-sonnet}
      MYCELIUM_LLM__API_KEY: ${MYCELIUM_LLM__API_KEY:-}
      MYCELIUM_MCP__AUTH_TOKEN: ${MYCELIUM_MCP__AUTH_TOKEN:-}
      MYCELIUM_OWNER__NAME: ${MYCELIUM_OWNER__NAME:-}
      MYCELIUM_RENDER__ENABLED: ${MYCELIUM_RENDER__ENABLED:-false}
      MYCELIUM_RENDER__PORT: ${MYCELIUM_RENDER__PORT:-9633}
      MYCELIUM_OBSIDIAN__ENABLED: ${MYCELIUM_OBSIDIAN__ENABLED:-true}
      MYCELIUM_OBSIDIAN__PROJECT_NEURONS: ${MYCELIUM_OBSIDIAN__PROJECT_NEURONS:-true}
    volumes:
      - ${MYCELIUM_DATA_DIR:-~/.mycelium}/vault:/root/.mycelium/vault
      - tg_uploads:/tmp/tg-uploads
      - ~/.claude:/root/.claude:ro
      - ~/.claude.json:/root/.claude.json:ro
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -o /dev/null -w '%{http_code}' -H \"Authorization: Bearer $MYCELIUM_MCP__AUTH_TOKEN\" http://localhost:9631/mcp | grep -qE '200|406'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # Telegram bot (fast + full mode: MCP calls + claude -p agent)
  telegram-bot:
    build: .
    container_name: mycelium-telegram
    command: ["uv", "run", "mycelium", "telegram"]
    environment:
      MYCELIUM_TELEGRAM__BOT_TOKEN: ${MYCELIUM_TELEGRAM__BOT_TOKEN:-}
      MYCELIUM_TELEGRAM__OWNER_CHAT_ID: ${MYCELIUM_TELEGRAM__OWNER_CHAT_ID:-0}
      MYCELIUM_TELEGRAM__MCP_URL: http://mycelium:9631/mcp
      MYCELIUM_TELEGRAM__MCP_AUTH_TOKEN: ${MYCELIUM_MCP__AUTH_TOKEN:-}
      MYCELIUM_LLM__MODEL: ${MYCELIUM_LLM__MODEL:-sonnet}
      MYCELIUM_TELEGRAM__STT_PROVIDER: ${MYCELIUM_TELEGRAM__STT_PROVIDER:-none}
      MYCELIUM_TELEGRAM__STT_API_KEY: ${MYCELIUM_TELEGRAM__STT_API_KEY:-}
      MYCELIUM_TELEGRAM__STT_WHISPER_URL: ${MYCELIUM_TELEGRAM__STT_WHISPER_URL:-http://whisper:8000}
      MYCELIUM_TELEGRAM__STT_MODEL: ${MYCELIUM_TELEGRAM__STT_MODEL:-medium}
      MYCELIUM_TELEGRAM__STT_LANGUAGE: ${MYCELIUM_TELEGRAM__STT_LANGUAGE:-auto}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
    volumes:
      - tg_uploads:/tmp/tg-uploads
      - ~/.claude:/root/.claude
      - ~/.claude.json:/root/.claude.json
    depends_on:
      mycelium:
        condition: service_healthy
    profiles:
      - telegram
    restart: unless-stopped

  # Local Whisper STT (optional, use --profile voice-whisper)
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: mycelium-whisper
    environment:
      WHISPER__MODEL: ${MYCELIUM_TELEGRAM__STT_MODEL:-medium}
      WHISPER__DEVICE: cpu
    volumes:
      - ${MYCELIUM_DATA_DIR:-~/.mycelium}/models/whisper:/root/.cache/huggingface
    profiles:
      - voice-whisper
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # Local TEI embeddings (optional, use --profile full)
  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    container_name: mycelium-embeddings
    command: --model-id BAAI/bge-m3 --port 9632
    volumes:
      - ${MYCELIUM_DATA_DIR:-~/.mycelium}/models/embeddings:/data
    profiles:
      - full
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9632/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # Vault sync: VPS ↔ Laptop (via Tailscale, no relay)
  syncthing:
    image: syncthing/syncthing:latest
    container_name: mycelium-syncthing
    hostname: mycelium-vps
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ${MYCELIUM_DATA_DIR:-~/.mycelium}/syncthing:/var/syncthing
      - ${MYCELIUM_DATA_DIR:-~/.mycelium}/vault:/var/syncthing/vault
    ports:
      - "8384:8384"   # Web UI (access via Tailscale only)
      - "22000:22000" # Sync protocol
    restart: unless-stopped

  # Tailscale mesh VPN
  tailscale:
    image: tailscale/tailscale:latest
    container_name: mycelium-tailscale
    hostname: mycelium-vps
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY:-}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - tailscale_state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

volumes:
  tg_uploads:
  tailscale_state:
