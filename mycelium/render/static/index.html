<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYCELIUM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600&family=Source+Code+Pro:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════
   MYCELIUM — Obsidian-style Sigma.js Viewer
   Accent: turquoise #40E0D0
   ══════════════════════════════════════════════════════════ */

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:         #000000;
  --bg-panel:   #080808;
  --bg-input:   #050505;
  --brd:        #202020;
  --brd-h:      #2a2a2a;

  --t-dim:      #585858;
  --t-muted:    #787878;
  --t-base:     #989898;
  --t-bright:   #c8c8c8;
  --t-max:      #e8e8e8;

  --accent:     #40E0D0;
  --accent-h:   #5CE0D6;
  --accent-dim: rgba(64, 224, 208, 0.10);
  --accent-glow:rgba(64, 224, 208, 0.25);

  --signal:     #d44090;
  --danger:     #e04848;

  --font-display: 'Outfit', system-ui, sans-serif;
  --font-mono:    'Source Code Pro', 'SF Mono', 'Fira Code', monospace;

  --fs-xs:   10px;
  --fs-s:    13px;
  --fs-base: 12px;
  --fs-m:    13px;
  --fs-l:    18px;

  --fw-thin:    100;
  --fw-light:   200;
  --fw-regular: 300;
  --fw-medium:  400;

  --panel-r:    12px;
  --ls-tight:   0.3px;
  --ls-normal:  0.5px;
  --ls-wide:    0.8px;
  --ls-caps:    1.0px;
  --ls-ultra:   1.5px;
}

:root.light {
  --bg:         #f5f5f8;
  --bg-panel:   #ffffff;
  --bg-input:   #e8e8e8;
  --brd:        #d8d8d8;
  --brd-h:      #c8c8c8;

  --t-dim:      #909090;
  --t-muted:    #707070;
  --t-base:     #606060;
  --t-bright:   #383838;
  --t-max:      #181818;

  --accent:     #2ab8b0;
  --accent-h:   #1a9890;
  --accent-dim: rgba(42, 184, 176, 0.08);
  --accent-glow:rgba(42, 184, 176, 0.15);

  --signal:     #c03070;
  --danger:     #c04040;
}

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg);
  color: var(--t-base);
  font-family: var(--font-mono);
  font-size: var(--fs-base);
  font-weight: var(--fw-thin);
  -webkit-font-smoothing: antialiased;
}

/* ── Header ──────────────────────────────────────────── */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 42px;
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px;
  background: var(--bg);
  border-bottom: 1px solid var(--brd);
}
#logo {
  font-family: var(--font-display);
  font-weight: var(--fw-regular);
  font-size: 14px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--t-bright);
}
.spacer { flex: 1; }

#search {
  width: 200px;
  padding: 5px 14px;
  border: 1px solid var(--brd);
  border-radius: 999px;
  background: var(--bg-input);
  color: var(--t-bright);
  font-family: var(--font-mono);
  font-size: var(--fs-base);
  font-weight: var(--fw-thin);
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
}
#search:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent-dim), 0 0 12px var(--accent-dim);
}
#search::placeholder { color: var(--t-muted); }

.hdr-sep {
  width: 1px; height: 18px;
  background: var(--brd);
}

.hdr-btn {
  padding: 3px 10px;
  border: 1px solid var(--brd);
  border-radius: 4px;
  background: transparent;
  color: var(--t-dim);
  font-family: var(--font-mono);
  font-size: var(--fs-s);
  font-weight: var(--fw-light);
  letter-spacing: var(--ls-wide);
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
.hdr-btn:hover { border-color: var(--accent); color: var(--accent); }
.hdr-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* ── Sigma Container ─────────────────────────────────── */
#sigma-container {
  position: absolute; top: 42px; left: 0; right: 0; bottom: 42px;
  z-index: 1;
  background: var(--bg);
}
#sigma-container canvas { cursor: default !important; }
#sigma-container canvas:active { cursor: grabbing !important; }

/* ── Tooltip ─────────────────────────────────────────── */
#tooltip {
  position: fixed; z-index: 300; pointer-events: none;
  padding: 10px 14px;
  border-radius: var(--panel-r);
  background: var(--bg-panel);
  border: 1px solid var(--brd);
  backdrop-filter: blur(16px);
  max-width: 340px;
  display: none;
  opacity: 0;
  animation: ttFadeIn 0.15s ease forwards;
}
@keyframes ttFadeIn { to { opacity: 1; } }
#tooltip::before {
  content: '';
  position: absolute; top: 0; left: 8px; right: 8px; height: 1px;
  background: var(--tt-color, var(--accent));
  border-radius: 1px;
  opacity: 0.6;
}
.tt-label {
  font-family: var(--font-display);
  font-weight: var(--fw-regular);
  font-size: var(--fs-m);
  color: var(--t-max);
  margin-bottom: 3px;
}
.tt-type {
  font-size: var(--fs-s);
  font-weight: var(--fw-light);
  letter-spacing: var(--ls-wide);
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}
.tt-meta {
  font-size: var(--fs-s);
  color: var(--t-muted);
  letter-spacing: var(--ls-tight);
}
.tt-meta span { color: var(--t-base); }

/* ── Legend ───────────────────────────────────────────── */
#legend {
  position: fixed; top: 54px; left: 16px; z-index: 90;
  padding: 12px 16px;
  border-radius: var(--panel-r);
  background: var(--bg-panel);
  border: 1px solid var(--brd);
  font-size: var(--fs-base);
  display: none;
  animation: legendIn 0.2s ease;
}
@keyframes legendIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}
#legend.visible { display: block; }
.leg-item {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 5px;
}
.leg-item:last-child { margin-bottom: 0; }
.leg-ring {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.leg-label { color: var(--t-base); letter-spacing: var(--ls-tight); }

/* ── Side Panel ──────────────────────────────────────── */
#panel {
  position: fixed; top: 54px; right: 12px; bottom: 54px;
  width: 340px; z-index: 90;
  background: var(--bg-panel);
  border: 1px solid var(--brd);
  border-radius: var(--panel-r);
  transform: translateX(calc(100% + 12px));
  transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  overflow-y: auto;
  overflow-x: hidden;
}
#panel.open { transform: translateX(0); }
#panel::-webkit-scrollbar { width: 3px; }
#panel::-webkit-scrollbar-track { background: transparent; margin: 10px 0; }
#panel::-webkit-scrollbar-thumb { background: var(--brd-h); border-radius: 3px; }

/* ── Settings Panel ──────────────────────────────────── */
#sfg-panel {
  position: fixed; top: 54px; right: 12px; bottom: 54px;
  width: 340px; z-index: 91;
  background: var(--bg-panel);
  border: 1px solid var(--brd);
  border-radius: var(--panel-r);
  transform: translateX(calc(100% + 12px));
  transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  overflow-y: auto;
}
#sfg-panel.open { transform: translateX(0); }
#sfg-panel::-webkit-scrollbar { width: 3px; }
#sfg-panel::-webkit-scrollbar-track { background: transparent; }
#sfg-panel::-webkit-scrollbar-thumb { background: var(--brd-h); border-radius: 3px; }
#sfg-content { padding: 24px 20px 40px; }

.sfg-title {
  font-family: var(--font-display);
  font-weight: var(--fw-regular);
  font-size: var(--fs-l);
  color: var(--t-max);
  margin-bottom: 20px;
  letter-spacing: var(--ls-ultra);
  text-transform: uppercase;
  padding-right: 32px;
}
.sfg-group {
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--brd);
}
.sfg-group:last-child { border-bottom: none; }
.sfg-label {
  font-size: var(--fs-s);
  font-weight: var(--fw-light);
  letter-spacing: var(--ls-caps);
  text-transform: uppercase;
  color: var(--t-muted);
  margin-bottom: 8px;
}
.sfg-row {
  display: flex; align-items: center; gap: 10px;
}
.sfg-slider {
  -webkit-appearance: none; appearance: none;
  flex: 1; height: 2px;
  background: var(--brd);
  border-radius: 1px;
  outline: none; cursor: pointer;
}
.sfg-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--t-muted);
  border: 1px solid var(--brd-h);
  cursor: pointer;
  transition: background 0.2s;
}
.sfg-slider::-webkit-slider-thumb:hover { background: var(--t-bright); }
.sfg-val {
  min-width: 32px; text-align: right;
  font-size: var(--fs-s);
  font-weight: var(--fw-light);
  color: var(--t-bright);
  font-variant-numeric: tabular-nums;
}
.sfg-toggle {
  position: relative; display: inline-block;
  cursor: pointer;
}
.sfg-toggle input { display: none; }
.sfg-toggle-track {
  display: block;
  width: 32px; height: 16px;
  border-radius: 8px;
  background: var(--brd);
  transition: background 0.2s;
}
.sfg-toggle input:checked + .sfg-toggle-track {
  background: var(--accent);
}
.sfg-toggle-thumb {
  position: absolute; top: 2px; left: 2px;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--t-muted);
  transition: transform 0.2s, background 0.2s;
}
.sfg-toggle input:checked + .sfg-toggle-track .sfg-toggle-thumb {
  transform: translateX(16px);
  background: var(--bg);
}

#panel-content { padding: 24px 20px 40px; }

.p-close {
  position: absolute; top: 16px; right: 16px;
  width: 24px; height: 24px;
  border: 1px solid var(--brd);
  border-radius: 3px;
  background: transparent;
  color: var(--t-dim);
  cursor: pointer;
  font-size: var(--fs-base);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s ease;
  z-index: 2;
}
.p-close:hover { border-color: var(--danger); color: var(--danger); }

.p-name {
  font-family: var(--font-display);
  font-weight: var(--fw-regular);
  font-size: var(--fs-l);
  color: var(--t-max);
  margin-bottom: 8px;
  line-height: 1.2;
  padding-right: 32px;
}
.p-type-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px;
  border-radius: 3px;
  font-size: var(--fs-s);
  font-weight: var(--fw-light);
  letter-spacing: var(--ls-wide);
  text-transform: uppercase;
  color: var(--t-bright);
  background: var(--bg);
  border: 1px solid var(--brd);
  margin-bottom: 16px;
}
.p-type-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
}
.p-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 2px; margin-bottom: 4px;
}
.p-cell { padding: 6px 0; }
.p-cell-label {
  font-size: var(--fs-xs);
  font-weight: var(--fw-light);
  letter-spacing: var(--ls-caps);
  text-transform: uppercase;
  color: var(--t-dim);
  margin-bottom: 2px;
}
.p-cell-val {
  font-size: var(--fs-m);
  font-weight: var(--fw-light);
  color: var(--t-bright);
  font-variant-numeric: tabular-nums;
}
.p-section {
  margin-top: 20px; padding-top: 16px;
  border-top: 1px solid var(--brd);
}
.p-section-title {
  font-family: var(--font-display);
  font-weight: var(--fw-regular);
  font-size: var(--fs-base);
  letter-spacing: var(--ls-ultra);
  text-transform: uppercase;
  color: var(--t-muted);
  margin-bottom: 12px;
}
.syn-item {
  padding: 10px 0;
  border-bottom: 1px solid rgba(32, 32, 32, 0.5);
}
.syn-item:last-child { border-bottom: none; }
.syn-head {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 4px;
}
.syn-dir { color: var(--t-dim); font-size: var(--fs-base); }
.syn-rel {
  font-size: var(--fs-s);
  font-weight: var(--fw-medium);
  letter-spacing: var(--ls-normal);
  color: var(--accent);
}
.syn-conf {
  margin-left: auto;
  font-size: var(--fs-s);
  color: var(--t-dim);
  font-variant-numeric: tabular-nums;
}
.syn-target {
  color: var(--t-bright);
  cursor: pointer;
  font-weight: var(--fw-medium);
  transition: color 0.15s;
}
.syn-target:hover { color: var(--accent-h); }
.syn-fact {
  font-size: var(--fs-base);
  color: var(--t-muted);
  margin-top: 4px;
  padding-left: 12px;
  border-left: 1px solid var(--brd);
  line-height: 1.5;
}
.sig-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid rgba(32, 32, 32, 0.3);
  font-size: var(--fs-base);
}
.sig-date { color: var(--t-dim); font-variant-numeric: tabular-nums; }
.sig-name { color: var(--t-base); }
.p-empty { color: var(--t-dim); font-size: var(--fs-base); }

/* ── Footer ──────────────────────────────────────────── */
#footer {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  height: 42px;
  display: flex; align-items: center; gap: 10px;
  padding: 0 20px;
  background: var(--bg);
  border-top: 1px solid var(--brd);
}
#stats {
  font-size: var(--fs-s);
  color: var(--t-dim);
  letter-spacing: var(--ls-tight);
  font-variant-numeric: tabular-nums;
  text-transform: uppercase;
}
#stats span { color: var(--t-muted); }

.ftr-btn {
  padding: 3px 10px;
  border: 1px solid var(--brd);
  border-radius: 4px;
  background: transparent;
  color: var(--t-dim);
  font-family: var(--font-mono);
  font-size: var(--fs-s);
  font-weight: var(--fw-light);
  letter-spacing: var(--ls-wide);
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
.ftr-btn:hover { border-color: var(--accent); color: var(--accent); }
.ftr-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* ── Loading ─────────────────────────────────────────── */
#loading {
  position: fixed; inset: 0; z-index: 500;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--bg);
}
#loading.hidden {
  opacity: 0; pointer-events: none;
  transition: opacity 0.6s ease;
}
.loader {
  position: relative; width: 64px; height: 64px;
}
.loader-ring {
  position: absolute; inset: 0;
  border: 1px solid transparent;
  border-radius: 50%;
  animation: spin linear infinite;
}
.loader-ring:nth-child(1) { border-top-color: var(--accent); animation-duration: 1.8s; }
.loader-ring:nth-child(2) { inset: 6px; border-right-color: var(--signal); animation-duration: 2.4s; animation-direction: reverse; }
.loader-ring:nth-child(3) { inset: 12px; border-bottom-color: var(--accent); animation-duration: 1.2s; }
.loader-ring:nth-child(3)::after {
  content: '';
  position: absolute; top: 50%; left: 50%;
  width: 3px; height: 3px; margin: -1.5px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-text {
  margin-top: 20px;
  font-family: var(--font-display);
  font-weight: 200; font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--t-dim);
}
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <span id="logo">Mycelium</span>
  <span class="spacer"></span>
  <input id="search" type="text" placeholder="search /" autocomplete="off" spellcheck="false">
  <span class="hdr-sep"></span>
  <button class="hdr-btn" id="btn-sfg" title="Settings">&#9881;</button>
</div>

<!-- Graph -->
<div id="sigma-container"></div>

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- Legend -->
<div id="legend"></div>

<!-- Side Panel -->
<div id="panel">
  <button class="p-close">&times;</button>
  <div id="panel-content"></div>
</div>

<!-- Settings Panel -->
<div id="sfg-panel">
  <button class="p-close" id="sfg-close">&times;</button>
  <div id="sfg-content">
    <div class="sfg-title">Settings</div>
    <div class="sfg-group">
      <div class="sfg-label">Node size</div>
      <div class="sfg-row">
        <input type="range" class="sfg-slider" id="sfg-node-size"
               min="0.5" max="5" step="0.1" value="2.0">
        <span class="sfg-val" id="sfg-node-size-val">2.0</span>
      </div>
    </div>
    <div class="sfg-group">
      <div class="sfg-label">Label size</div>
      <div class="sfg-row">
        <input type="range" class="sfg-slider" id="sfg-label-size"
               min="0" max="20" step="1" value="10">
        <span class="sfg-val" id="sfg-label-size-val">10</span>
      </div>
    </div>
    <div class="sfg-group">
      <div class="sfg-label">Edge width</div>
      <div class="sfg-row">
        <input type="range" class="sfg-slider" id="sfg-edge-scale"
               min="0.1" max="3" step="0.1" value="0.3">
        <span class="sfg-val" id="sfg-edge-scale-val">1.0</span>
      </div>
    </div>
    <div class="sfg-group">
      <div class="sfg-label">Live physics</div>
      <div class="sfg-row">
        <label class="sfg-toggle">
          <input type="checkbox" id="sfg-live-physics">
          <span class="sfg-toggle-track"><span class="sfg-toggle-thumb"></span></span>
        </label>
        <span class="sfg-val" id="sfg-live-physics-val" style="min-width:24px">Off</span>
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<div id="footer">
  <div id="stats">
    <span>Neurons</span> <span id="st-neurons">-</span>
    &middot; <span>Synapses</span> <span id="st-synapses">-</span>
    &middot; <span>Shown</span> <span id="st-shown">-</span>
  </div>
  <span class="spacer"></span>
  <button class="ftr-btn active" data-layer="types">Types</button>
  <button class="ftr-btn" data-layer="clusters">Clusters</button>
  <button class="ftr-btn" data-layer="decay">Decay</button>
</div>

<!-- Loading -->
<div id="loading">
  <div class="loader">
    <div class="loader-ring"></div>
    <div class="loader-ring"></div>
    <div class="loader-ring"></div>
  </div>
  <div class="load-text">Mapping consciousness</div>
</div>

<script src="/static/graphology.min.js"></script>
<script src="/static/sigma.min.js"></script>
<script src="/static/graphology-layout-forceatlas2.min.js"></script>
<script>
/* ══════════════════════════════════════════════════════════
   MYCELIUM Sigma.js — Obsidian-style Graph Viewer
   ══════════════════════════════════════════════════════════ */

// ── Theme (loaded from JSON, these are defaults) ─────────
let THEME = {
  background: '#000000',
  node: {
    types: {
      trait:          '#B4BEFE',
      concept:        '#F5E0DC',
      interest:       '#F38BA8',
      event:          '#7DC4E4',
      practice:       '#A6E3A1',
      goal:           '#B4A7D6',
      emotion:        '#E8506A',
      belief:         '#CBA6F7',
      skill:          '#89B4FA',
      body:           '#EBA0AC',
      resource:       '#74C7EC',
      recommendation: '#89DCEB',
      period:         '#F2CDCD',
      person:         '#94E2D5',
      place:          '#A6E3A1',
      community:      '#585B70',
      owner:          '#94E2D5',
      habit:          '#A6E3A1',
      _default:       '#6C7086',
    },
    label: '#585858',
  },
  edge: {
    muted:     '#222222',
    highlight: '#5CE0D6',
  },
  decay: {
    fresh: '#88c898',
    aging: '#d8a858',
    stale: '#c87878',
  },
};

// ── State ────────────────────────────────────────────────
let renderer      = null;
let graph         = null;
let rawData       = null;
let ownerNodeId   = null;
let hoveredNode   = null;
let selectedNodes = new Set();
let searchQuery   = '';
let matchSet      = new Set();
let activeLayer   = 'types';
let degreeMap     = {};
let comboMap      = {};
let comboRange    = [0, 1];
let clusterMap    = {};
let allTypesNull  = false;
let inferredType  = {};
let isDragging    = false;
let draggedNode   = null;

// ── Helpers ──────────────────────────────────────────────

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function lerp(a, b, t) { return a + (b - a) * Math.min(1, Math.max(0, t)); }

function mapRange(val, inMin, inMax, outMin, outMax) {
  return lerp(outMin, outMax, (val - inMin) / (inMax - inMin || 1));
}

const CPAL = [
  '#40E0D0','#48b8a8','#c87878','#c8a848','#58a870',
  '#8878c8','#c08850','#b868a0','#6890b8','#88b868',
  '#b86868','#4898c8','#9878b8','#68b098','#c89858',
];

const REL_TO_TYPE = {
  'HAS_TRAIT':      'trait',
  'INTERESTED_IN':  'interest',
  'HAS_SKILL':      'skill',
  'BELIEVES':       'belief',
  'FEELS':          'emotion',
  'INFLUENCES':     'influence',
  'EXPERIENCED':    'experience',
  'IS_A':           'identity',
  'KNOWS':          'person',
  'LOCATED_AT':     'place',
  'RELATES_TO':     'concept',
};

const INFERRED_COLORS = THEME.node.types;

function nodeColor(id) {
  const d = graph.getNodeAttributes(id);
  if (activeLayer === 'decay') {
    const ew = d.ew ?? 0;
    if (ew >= 0.5)  return THEME.decay.fresh;
    if (ew >= 0.25) return THEME.decay.aging;
    return THEME.decay.stale;
  }
  if (activeLayer === 'clusters') {
    return CPAL[(clusterMap[id] ?? 0) % CPAL.length];
  }
  const t = d.neuronType || inferredType[id] || '_default';
  return INFERRED_COLORS[t] || THEME.node.types[t] || INFERRED_COLORS._default;
}

function computeComboWeight(ew, degree) {
  return ew * (1 + Math.log2(1 + degree));
}

function isPerson(id) {
  const t = graph.getNodeAttributes(id).neuronType || inferredType[id] || '';
  return t === 'person' || t === 'owner';
}

function nodeSize(id) {
  const s = nodeScale;
  if (id === ownerNodeId) return 14 * s;
  if (isPerson(id)) return 10 * s;
  const cw = comboMap[id] ?? 0;
  return mapRange(cw, comboRange[0], comboRange[1], 3 * s, 10 * s);
}

function edgeWidth(conf) {
  return mapRange(conf || 0.5, 0, 1, 0.5, 3.0);
}

function timeAgo(iso) {
  if (!iso) return '—';
  const days = Math.floor((Date.now() - new Date(iso)) / 86400000);
  if (days < 1) return 'today';
  if (days < 30) return days + 'd';
  if (days < 365) return Math.floor(days / 30) + 'mo';
  return Math.floor(days / 365) + 'y';
}

// ── Clusters (BFS connected components) ──────────────────
function computeClusters(nodes, edges) {
  clusterMap = {};
  const adj = {};
  for (const n of nodes) adj[n.id] = [];
  for (const e of edges) {
    if (adj[e.source]) adj[e.source].push(e.target);
    if (adj[e.target]) adj[e.target].push(e.source);
  }
  let ci = 0;
  const vis = new Set();
  for (const n of nodes) {
    if (vis.has(n.id)) continue;
    const q = [n.id];
    while (q.length) {
      const c = q.shift();
      if (vis.has(c)) continue;
      vis.add(c);
      clusterMap[c] = ci;
      for (const nb of (adj[c] || [])) if (!vis.has(nb)) q.push(nb);
    }
    ci++;
  }
}

// ── Tooltip ──────────────────────────────────────────────

let tooltipVisible = false;

function showTooltip(x, y, html) {
  // Skip if mouse hasn't moved yet (would show at 0,0)
  if (x === 0 && y === 0) return;
  $tip.innerHTML = html;
  $tip.style.display = 'block';
  tooltipVisible = true;
  requestAnimationFrame(() => {
    const r = $tip.getBoundingClientRect();
    $tip.style.left = Math.min(x + 16, window.innerWidth  - r.width  - 12) + 'px';
    $tip.style.top  = Math.min(y + 16, window.innerHeight - r.height - 12) + 'px';
  });
}
function hideTooltip() {
  $tip.style.display = 'none';
  tooltipVisible = false;
}

// ── Legend ────────────────────────────────────────────────

function renderLegend() {
  let html = '';
  if (activeLayer === 'types') {
    // Collect types actually present in graph
    const seen = new Map();
    if (graph) graph.forEachNode((id, attrs) => {
      const t = attrs.neuronType || inferredType[id] || '';
      if (t && !seen.has(t)) seen.set(t, THEME.node.types[t] || INFERRED_COLORS._default);
    });
    for (const [type, color] of seen) {
      html += `<div class="leg-item"><span class="leg-ring" style="background:${color}"></span><span class="leg-label">${type}</span></div>`;
    }
  } else if (activeLayer === 'decay') {
    for (const [c, l] of [[THEME.decay.fresh,'Fresh'],[THEME.decay.aging,'Aging'],[THEME.decay.stale,'Stale']]) {
      html += `<div class="leg-item"><span class="leg-ring" style="background:${c}"></span><span class="leg-label">${l}</span></div>`;
    }
  } else if (activeLayer === 'clusters') {
    html += `<div class="leg-label" style="color:var(--t-dim)">Connected components</div>`;
  }
  $legend.innerHTML = html;
  $legend.classList.toggle('visible', html.length > 0);
}

function openPanel(nodeId) {
  if (!graph.hasNode(nodeId)) return;
  closeSfgPanel();
  const d = graph.getNodeAttributes(nodeId);
  const color = nodeColor(nodeId);

  let h = '';
  h += `<div class="p-name">${esc(d.label || nodeId)}</div>`;
  h += `<div class="p-type-badge"><span class="p-type-dot" style="color:${color}"></span>${esc(d.neuronType || inferredType[nodeId] || 'unknown')}</div>`;
  h += `<div class="p-grid">`;
  h += cell('Weight',    (d.ew ?? 0).toFixed(3));
  h += cell('Conf',      (d.conf ?? 0).toFixed(2));
  h += cell('Confirmed', (d.cnt ?? 0) + '×');
  h += cell('Fresh',     timeAgo(d.freshness));
  h += cell('Degree',    degreeMap[nodeId] ?? 0);
  h += cell('UUID',      nodeId.slice(0, 8));
  h += `</div>`;
  h += `<div class="p-section" id="panel-synapses"><div class="p-section-title">Synapses</div><div class="p-empty">Loading…</div></div>`;
  h += `<div class="p-section" id="panel-signals"><div class="p-section-title">Signals</div></div>`;
  $panelC.innerHTML = h;
  $panel.classList.add('open');

  fetch(`/api/neuron/${nodeId}`).then(r => r.json()).then(data => {
    renderPanelDetails(data, nodeId);
  }).catch(() => {
    const el = document.getElementById('panel-synapses');
    if (el) el.innerHTML = '<div class="p-section-title">Synapses</div><div class="p-empty" style="color:var(--danger)">Failed to load</div>';
  });
}

function cell(label, val) {
  return `<div class="p-cell"><div class="p-cell-label">${label}</div><div class="p-cell-val">${val}</div></div>`;
}

function renderPanelDetails(data, nodeId) {
  const $syn = document.getElementById('panel-synapses');
  const $sig = document.getElementById('panel-signals');
  if (!$syn) return;

  let sh = '<div class="p-section-title">Synapses</div>';
  if (data.synapses?.length) {
    for (const s of data.synapses) {
      const dir  = s.outgoing ? '→' : '←';
      const peer = s.other || '?';
      sh += `<div class="syn-item">
        <div class="syn-head">
          <span class="syn-dir">${dir}</span>
          <span class="syn-rel">${esc((s.relation || 'RELATES_TO').replace(/_/g, ' ').toLowerCase())}</span>
          <span class="syn-conf">${(s.conf ?? 0).toFixed(2)}</span>
        </div>
        <span class="syn-target" data-uuid="${esc(s.other_uuid || '')}">${esc(peer)}</span>
        ${s.fact ? `<div class="syn-fact">${esc(s.fact)}</div>` : ''}
      </div>`;
    }
  } else {
    sh += '<div class="p-empty">No synapses</div>';
  }
  $syn.innerHTML = sh;

  $syn.querySelectorAll('.syn-target').forEach(el => {
    el.addEventListener('click', () => {
      const uuid = el.dataset.uuid;
      if (uuid && graph.hasNode(uuid)) {
        selectedNodes.clear();
        selectedNodes.add(uuid);
        focusNode(uuid);
        openPanel(uuid);
        renderer.refresh();
      }
    });
  });

  let sgh = '<div class="p-section-title">Signals</div>';
  if (data.signals?.length) {
    for (const s of data.signals) {
      sgh += `<div class="sig-item">
        <span class="sig-name">${esc(s.name || s.source || '—')}</span>
        <span class="sig-date">${s.created ? new Date(s.created).toLocaleDateString() : '—'}</span>
      </div>`;
    }
  } else {
    sgh += '<div class="p-empty">No signals</div>';
  }
  if ($sig) $sig.innerHTML = sgh;
}

function closePanel() {
  $panel.classList.remove('open');
  selectedNodes.clear();
  if (renderer) renderer.refresh();
}

// ── Focus camera on node ─────────────────────────────────

function focusNode(nodeId) {
  if (!renderer || !graph.hasNode(nodeId)) return;
  try {
    const attrs  = graph.getNodeAttributes(nodeId);
    const vp     = renderer.graphToViewport({ x: attrs.x, y: attrs.y });
    const framed = renderer.viewportToFramedGraph(vp);
    renderer.getCamera().animate(
      { x: framed.x, y: framed.y, ratio: renderer.getCamera().ratio },
      { duration: 400 }
    );
  } catch (err) {
    console.warn('focusNode failed:', err);
  }
}

// ── Search ───────────────────────────────────────────────

function applySearch(q) {
  searchQuery = (q || '').trim().toLowerCase();
  matchSet.clear();
  if (!graph || !renderer) return;
  if (searchQuery) {
    graph.forEachNode((id, attrs) => {
      if ((attrs.label || '').toLowerCase().includes(searchQuery)) matchSet.add(id);
    });
  }
  renderer.refresh();
  updateShownCount();

  if (matchSet.size === 1) focusNode([...matchSet][0]);
}

$search.addEventListener('input', () => applySearch($search.value));

function updateShownCount() {
  if (!graph) return;
  $('#st-shown').textContent = searchQuery ? matchSet.size : graph.order;
}

// ── Build Graph (Graphology) ─────────────────────────────

function buildGraph(raw) {
  const G = new graphology.Graph();

  for (const n of raw.nodes) {
    G.addNode(n.id, {
      label:      n.label || '',
      neuronType: n.type || null,
      ew:         n.ew ?? 0,
      conf:       n.conf ?? 0,
      cnt:        n.cnt ?? 0,
      freshness:  n.freshness || null,
      x:          Math.random() * 100 - 50,
      y:          Math.random() * 100 - 50,
      size:       3,
      color:      '#808898',
    });
  }

  for (const e of raw.edges) {
    if (G.hasNode(e.source) && G.hasNode(e.target)) {
      try {
        G.addEdgeWithKey(e.id, e.source, e.target, {
          fact:     e.fact || '',
          relation: e.relation || 'RELATES_TO',
          conf:     e.conf ?? 0.5,
        });
      } catch (_) {
        // skip duplicate edges
      }
    }
  }

  return G;
}

// ── Apply visual attributes to graph ─────────────────────

function applyVisuals() {
  graph.forEachNode((id) => {
    graph.setNodeAttribute(id, 'size', nodeSize(id));
    graph.setNodeAttribute(id, 'color', nodeColor(id));
  });
  graph.forEachEdge((id, attrs) => {
    graph.setEdgeAttribute(id, 'size', edgeWidth(attrs.conf));
    graph.setEdgeAttribute(id, 'color', THEME.edge.muted);
  });
}

// ── Live Physics (Obsidian-style velocity-Verlet) ─────────

const SIM = {
  repelStrength:  120,   // Coulomb repulsion
  linkStrength:   0.08,  // Hooke spring constant
  linkDistance:    60,    // target edge rest length
  centerStrength: 0.03,  // pull toward center
  velocityDecay:  0.4,   // damping per tick
  alphaDecay:     1 - Math.pow(0.001, 1 / 300),  // ~0.0228
  alphaMin:       0.001,
};

let simAlpha     = 0;
let simRaf       = null;
let simVelocity  = {};   // nodeId → {vx, vy}

function simStart() {
  simAlpha = 1;
  simVelocity = {};
  graph.forEachNode((id) => { simVelocity[id] = { vx: 0, vy: 0 }; });
  if (!simRaf) simTick();
}

function simStop() {
  if (simRaf) { cancelAnimationFrame(simRaf); simRaf = null; }
  simVelocity = {};
  // Unpin all nodes
  graph.forEachNode((id) => { graph.setNodeAttribute(id, 'fixed', false); });
}

function simReheat(a) {
  simAlpha = Math.max(simAlpha, a || 0.3);
  if (livePhysics && !simRaf) simTick();
}

function simTick() {
  if (!livePhysics) { simRaf = null; return; }

  // Cool down
  simAlpha += (0 - simAlpha) * SIM.alphaDecay;
  if (simAlpha < SIM.alphaMin) {
    simRaf = null;
    return; // settled
  }

  // Collect nodes
  const nodes = [];
  graph.forEachNode((id, a) => {
    if (!simVelocity[id]) simVelocity[id] = { vx: 0, vy: 0 };
    nodes.push({ id, x: a.x, y: a.y, fixed: !!a.fixed });
  });
  const N = nodes.length;
  if (N === 0) { simRaf = null; return; }

  // Center of mass
  let cx = 0, cy = 0;
  for (const n of nodes) { cx += n.x; cy += n.y; }
  cx /= N; cy /= N;

  // Center force
  const cf = SIM.centerStrength * simAlpha;
  for (const n of nodes) {
    if (n.fixed) continue;
    const v = simVelocity[n.id];
    v.vx += (cx - n.x) * cf;
    v.vy += (cy - n.y) * cf;
  }

  // Repulsion (Coulomb, all pairs)
  const rf = SIM.repelStrength * simAlpha;
  for (let i = 0; i < N; i++) {
    for (let j = i + 1; j < N; j++) {
      const a = nodes[i], b = nodes[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const d2 = dx * dx + dy * dy || 1;
      const f  = rf / d2;
      const fx = dx * f, fy = dy * f;
      if (!a.fixed) { simVelocity[a.id].vx -= fx; simVelocity[a.id].vy -= fy; }
      if (!b.fixed) { simVelocity[b.id].vx += fx; simVelocity[b.id].vy += fy; }
    }
  }

  // Link force (Hooke, edges)
  const lf = SIM.linkStrength * simAlpha;
  graph.forEachEdge((edge, attrs, src, tgt) => {
    const sn = graph.getNodeAttributes(src);
    const tn = graph.getNodeAttributes(tgt);
    const dx = tn.x - sn.x, dy = tn.y - sn.y;
    const d  = Math.sqrt(dx * dx + dy * dy) || 1;
    const f  = (d - SIM.linkDistance) * lf / d;
    const fx = dx * f, fy = dy * f;
    if (!sn.fixed) { simVelocity[src].vx += fx; simVelocity[src].vy += fy; }
    if (!tn.fixed) { simVelocity[tgt].vx -= fx; simVelocity[tgt].vy -= fy; }
  });

  // Apply velocity + damping + velocity cap
  const decay  = 1 - SIM.velocityDecay;
  const maxSpd = 8;  // max displacement per tick
  for (const n of nodes) {
    if (n.fixed) continue;
    const v = simVelocity[n.id];
    v.vx *= decay;
    v.vy *= decay;
    // Cap velocity magnitude
    const spd = Math.sqrt(v.vx * v.vx + v.vy * v.vy);
    if (spd > maxSpd) {
      const s = maxSpd / spd;
      v.vx *= s;
      v.vy *= s;
    }
    graph.setNodeAttribute(n.id, 'x', n.x + v.vx);
    graph.setNodeAttribute(n.id, 'y', n.y + v.vy);
  }

  simRaf = requestAnimationFrame(simTick);
}

function toggleLivePhysics(on) {
  livePhysics = on;
  if (on) simStart();
  else    simStop();
}

// ── Custom label renderer (pill background) ──────────────

function drawPillLabel(ctx, data, settings) {
  if (!data.label) return;

  // Scale font with node size (tracks zoom like Obsidian)
  const scale = settings.labelSize / 8;
  const size  = Math.max(data.size * scale, 2);
  if (size < 3) return;  // too small to read — skip

  const font = settings.labelFont;
  ctx.font   = `200 ${size}px ${font}`;

  const text = data.label;
  const x    = data.x + data.size + 3;
  const y    = data.y;

  ctx.fillStyle    = data.color || THEME.node.label;
  ctx.globalAlpha  = Math.min((size - 3) / 4, 1);  // fade in
  ctx.textAlign    = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
  ctx.globalAlpha  = 1;
}

function drawPillHover(ctx, data, settings) {
  if (!data.label) return;

  const scale = settings.labelSize / 8;
  const size  = Math.max(data.size * scale * 1.1, 8);

  const font = settings.labelFont;
  ctx.font   = `300 ${size}px ${font}`;

  const text = data.label;
  const tw   = ctx.measureText(text).width;
  const pad  = { x: 5, y: 3 };
  const h    = size + pad.y * 2;
  const r    = h / 2;
  const x    = data.x + data.size + 3;
  const y    = data.y;

  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.roundRect(x - pad.x, y - h / 2, tw + pad.x * 2, h, r);
  ctx.fill();

  ctx.fillStyle    = '#000000';
  ctx.textAlign    = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
}

// ── Init Sigma ───────────────────────────────────────────

function initSigma() {
  const container = document.getElementById('sigma-container');

  renderer = new Sigma(graph, container, {
    allowInvalidContainer: true,
    enableEdgeEvents:      true,
    defaultEdgeType:       'rectangle',
    edgeProgramClasses:    { rectangle: Sigma.rendering.EdgeRectangleProgram },
    minEdgeThickness:      0,
    renderLabels:          labelSize > 0,
    labelFont:             "'Source Code Pro', monospace",
    labelSize:             labelSize,
    labelWeight:           '200',
    labelColor:            { color: THEME.node.label },
    labelDensity:          1,
    labelGridCellSize:     80,
    labelRenderedSizeThreshold: 1,
    defaultDrawNodeLabel:  drawPillLabel,
    defaultDrawNodeHover:  drawPillHover,
    stagePadding:          40,
    zIndex:                true,

    nodeReducer(node, data) {
      const res = { ...data };

      // Selected nodes always stay highlighted
      if (selectedNodes.has(node)) {
        res.highlighted = true;
        res.zIndex = 10;
      }
      // Hover dims everything except hovered, its neighbors, and selected
      else if (hoveredNode) {
        if (node === hoveredNode) {
          res.highlighted = true;
          res.zIndex = 10;
        } else if (graph.areNeighbors(node, hoveredNode)) {
          res.zIndex = 5;
        } else {
          res.color = dimColor(res.color, 0.15);
          res.label = '';
          res.zIndex = 0;
        }
      }
      // No hover — dim non-selected, non-neighbor
      else if (selectedNodes.size) {
        let isNeighbor = false;
        for (const sn of selectedNodes) {
          if (graph.areNeighbors(node, sn)) { isNeighbor = true; break; }
        }
        if (!isNeighbor) {
          res.color = dimColor(res.color, 0.15);
          res.label = '';
          res.zIndex = 0;
        }
      }

      // Search filter
      if (searchQuery && !matchSet.has(node)) {
        res.color = dimColor(res.color, 0.08);
        res.label = '';
        res.zIndex = 0;
      }

      return res;
    },

    edgeReducer(edge, data) {
      const res = { ...data };
      res.size = (res.size || 1) * edgeScale;
      const src = graph.source(edge);
      const tgt = graph.target(edge);

      const selEdge = selectedNodes.has(src) || selectedNodes.has(tgt);

      // Selected edges always stay highlighted
      if (selEdge) {
        res.color  = THEME.edge.highlight;
        res.size   = Math.max(res.size, 0.3) * 1.5;
        res.zIndex = 10;
      } else if (hoveredNode) {
        if (src === hoveredNode || tgt === hoveredNode) {
          res.color  = THEME.edge.highlight;
          res.size   = Math.max(res.size, 0.3) * 1.5;
          res.zIndex = 10;
        } else {
          res.color  = dimColor(res.color, 0.15);
          res.zIndex = 0;
        }
      } else if (selectedNodes.size) {
        res.color  = dimColor(res.color, 0.15);
        res.zIndex = 0;
      }

      if (searchQuery) {
        if (!matchSet.has(src) && !matchSet.has(tgt)) {
          res.color = dimColor(res.color, 0.05);
          res.zIndex = 0;
        }
      }

      return res;
    },
  });

  // ── Events ────────────────────────────────────────────

  renderer.on('enterNode', ({ node }) => {
    hoveredNode = node;
    renderer.refresh({ skipIndexation: true });
    const d = graph.getNodeAttributes(node);
    const tc = nodeColor(node);
    $tip.style.setProperty('--tt-color', tc);
    showTooltip(mouseX, mouseY,
      `<div class="tt-label">${esc(d.label || node)}</div>` +
      `<div class="tt-type" style="color:${tc}">${esc(d.neuronType || inferredType[node] || 'unknown')}</div>` +
      `<div class="tt-meta">ew <span>${(d.ew ?? 0).toFixed(3)}</span> · deg <span>${degreeMap[node] ?? 0}</span></div>`
    );
  });

  renderer.on('leaveNode', () => {
    hoveredNode = null;
    hideTooltip();
    renderer.refresh({ skipIndexation: true });
  });

  renderer.on('clickNode', ({ node, event }) => {
    if (event.original.shiftKey) {
      if (selectedNodes.has(node)) selectedNodes.delete(node);
      else                         selectedNodes.add(node);
    } else {
      selectedNodes.clear();
      selectedNodes.add(node);
    }
    renderer.refresh({ skipIndexation: true });
    openPanel(node);
  });

  renderer.on('doubleClickNode', ({ node, event }) => {
    event.preventSigmaDefault();
    expandNeighbors(node);
  });

  renderer.on('clickStage', () => {
    if (selectedNodes.size) {
      selectedNodes.clear();
      renderer.refresh({ skipIndexation: true });
      closePanel();
    }
  });

  // Edge events
  renderer.on('enterEdge', ({ edge }) => {
    const src = graph.source(edge);
    const tgt = graph.target(edge);
    const attrs = graph.getEdgeAttributes(edge);
    const sn = graph.getNodeAttributes(src);
    const tn = graph.getNodeAttributes(tgt);
    showTooltip(mouseX, mouseY,
      `<div class="tt-meta"><span>${esc(sn.label || '?')}</span> → ${esc((attrs.relation || 'relates_to').replace(/_/g,' '))} → <span>${esc(tn.label || '?')}</span></div>` +
      (attrs.fact ? `<div class="tt-label" style="margin-top:6px;font-size:12px;color:var(--t-base)">${esc(attrs.fact)}</div>` : '')
    );
  });

  renderer.on('leaveEdge', () => hideTooltip());

  // Track mouse position + move tooltip
  container.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    if (tooltipVisible) {
      const r = $tip.getBoundingClientRect();
      $tip.style.left = Math.min(mouseX + 16, window.innerWidth  - r.width  - 12) + 'px';
      $tip.style.top  = Math.min(mouseY + 16, window.innerHeight - r.height - 12) + 'px';
    }
  });

  // ── Drag'n'drop ───────────────────────────────────────

  renderer.on('downNode', (e) => {
    isDragging  = true;
    draggedNode = e.node;
    graph.setNodeAttribute(draggedNode, 'highlighted', true);
    graph.setNodeAttribute(draggedNode, 'fixed', true);
    // Reheat simulation so neighbors respond to drag
    if (livePhysics) simReheat(0.3);
    if (!renderer.getCustomBBox()) renderer.setCustomBBox(renderer.getBBox());
  });

  renderer.on('moveBody', ({ event }) => {
    if (!isDragging || !draggedNode) return;
    const pos = renderer.viewportToGraph(event);
    graph.setNodeAttribute(draggedNode, 'x', pos.x);
    graph.setNodeAttribute(draggedNode, 'y', pos.y);
    // Keep simulation warm while dragging
    if (livePhysics) simReheat(0.15);
    event.preventSigmaDefault();
    event.original.preventDefault();
    event.original.stopPropagation();
  });

  const handleUp = () => {
    if (draggedNode) {
      graph.removeNodeAttribute(draggedNode, 'highlighted');
      // Unpin node — let it settle back into the simulation
      graph.setNodeAttribute(draggedNode, 'fixed', false);
      // Gentle reheat so graph relaxes smoothly
      if (livePhysics) simReheat(0.1);
    }
    isDragging  = false;
    draggedNode = null;
  };
  renderer.on('upNode', handleUp);
  renderer.on('upStage', handleUp);
}

// ── Color utilities ──────────────────────────────────────

function dimColor(color, alpha) {
  if (!color || color.length < 4) return `rgba(128,128,128,${alpha})`;
  // Already rgba — extract rgb, replace alpha
  if (color.startsWith('rgba')) {
    const m = color.match(/[\d.]+/g);
    if (m) return `rgba(${m[0]},${m[1]},${m[2]},${alpha})`;
  }
  if (color.startsWith('rgb')) {
    const m = color.match(/\d+/g);
    if (m) return `rgba(${m[0]},${m[1]},${m[2]},${alpha})`;
  }
  // Hex
  const r = parseInt(color.slice(1,3), 16) || 128;
  const g = parseInt(color.slice(3,5), 16) || 128;
  const b = parseInt(color.slice(5,7), 16) || 128;
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Expand neighbors (double-click) ──────────────────────

async function expandNeighbors(nodeId) {
  try {
    const resp = await fetch(`/api/neighbors/${nodeId}`);
    const data = await resp.json();
    let added = 0;

    for (const n of data.nodes) {
      if (!graph.hasNode(n.id)) {
        const attrs = graph.getNodeAttributes(nodeId);
        graph.addNode(n.id, {
          label:      n.label || '',
          neuronType: n.type || null,
          ew:         n.ew ?? 0,
          conf:       n.conf ?? 0,
          cnt:        n.cnt ?? 0,
          freshness:  n.freshness || null,
          x:          attrs.x + (Math.random() - 0.5) * 30,
          y:          attrs.y + (Math.random() - 0.5) * 30,
          size:       3,
          color:      '#808898',
        });
        degreeMap[n.id] = 0;
        comboMap[n.id]  = computeComboWeight(n.ew || 0, 0);
        if (allTypesNull && !inferredType[n.id]) inferredType[n.id] = 'concept';
        added++;
      }
    }

    for (const e of data.edges) {
      if (graph.hasNode(e.source) && graph.hasNode(e.target) && !graph.hasEdge(e.id)) {
        try {
          graph.addEdgeWithKey(e.id, e.source, e.target, {
            fact:     e.fact || '',
            relation: e.relation || 'RELATES_TO',
            conf:     e.conf ?? 0.5,
          });
          degreeMap[e.source] = (degreeMap[e.source] || 0) + 1;
          degreeMap[e.target] = (degreeMap[e.target] || 0) + 1;
          // Infer type from relation for new nodes
          if (allTypesNull) {
            const itype = REL_TO_TYPE[e.relation] || 'concept';
            if (!inferredType[e.source]) inferredType[e.source] = itype;
            if (!inferredType[e.target]) inferredType[e.target] = itype;
          }
        } catch(_) {}
      }
    }

    if (added > 0) {
      applyVisuals();
      // Quick FA2 to settle new nodes
      ForceAtlas2.assign(graph, {
        iterations: 50,
        settings: { gravity: 1, scalingRatio: 2, strongGravityMode: true, barnesHutOptimize: true, slowDown: 5 }
      });
      updateShownCount();
    }
  } catch (err) {
    console.error('Expand neighbors failed:', err);
  }
}

// ── Theme switching ──────────────────────────────────────

let currentTheme = localStorage.getItem('mycelium-theme') || 'dark';

async function applyTheme(name) {
  currentTheme = name;
  localStorage.setItem('mycelium-theme', name);

  if (name === 'light') document.documentElement.classList.add('light');
  else                   document.documentElement.classList.remove('light');

  try {
    const t = await (await fetch(`/static/themes/${name}.json?v=${Date.now()}`)).json();
    THEME.background = t.background || THEME.background;
    if (t.node?.types) Object.assign(THEME.node.types, t.node.types);
    if (t.node?.label) THEME.node.label = t.node.label;
    if (t.edge) {
      THEME.edge.muted     = t.edge.color || t.edge.muted || THEME.edge.muted;
      THEME.edge.highlight = t.edge.highlight || THEME.edge.highlight;
    }
    if (t.decay) Object.assign(THEME.decay, t.decay);
  } catch (_) {}

  if (renderer) {
    document.getElementById('sigma-container').style.background = THEME.background;
    renderer.setSetting('labelColor', { color: THEME.node.label });
    applyVisuals();
    renderer.refresh();
  }
  renderLegend();
}

if (currentTheme === 'light') document.documentElement.classList.add('light');

// ── Layer switching ──────────────────────────────────────

function switchLayer(layer) {
  activeLayer = layer;
  $$('[data-layer]').forEach(b => b.classList.toggle('active', b.dataset.layer === layer));
  renderLegend();
  if (graph) { applyVisuals(); renderer.refresh(); }
}

$$('[data-layer]').forEach(b => b.addEventListener('click', () => switchLayer(b.dataset.layer)));

// ── Keyboard ─────────────────────────────────────────────

document.addEventListener('keydown', (e) => {
  if (e.target === $search) {
    if (e.key === 'Escape') { $search.value = ''; applySearch(''); $search.blur(); }
    return;
  }
  switch (e.key) {
    case '/': e.preventDefault(); $search.focus(); break;
    case 'r': case 'R':
      if (renderer) renderer.getCamera().animatedReset({ duration: 500 });
      break;
    case 'l': case 'L': {
      const m = ['types','clusters','decay'];
      switchLayer(m[(m.indexOf(activeLayer) + 1) % m.length]);
      break;
    }
    case 'd': case 'D':
      applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
      break;
    case 'Escape':
      closePanel(); closeSfgPanel();
      break;
  }
});

// ── Main ─────────────────────────────────────────────────

async function main() {
  // Load theme
  await applyTheme(currentTheme);

  // Fetch graph data
  const raw = await (await fetch('/api/graph')).json();
  rawData = raw;

  // Compute degree + comboWeight
  degreeMap = {};
  for (const e of raw.edges) {
    degreeMap[e.source] = (degreeMap[e.source] || 0) + 1;
    degreeMap[e.target] = (degreeMap[e.target] || 0) + 1;
  }
  comboMap = {};
  let minCw = Infinity, maxCw = 0;
  for (const n of raw.nodes) {
    const cw = computeComboWeight(n.ew || 0, degreeMap[n.id] || 0);
    comboMap[n.id] = cw;
    if (cw < minCw) minCw = cw;
    if (cw > maxCw) maxCw = cw;
  }
  comboRange = [minCw === Infinity ? 0 : minCw, maxCw || 1];

  // Detect if all neuron_types are null
  allTypesNull = raw.nodes.every(n => !n.type);

  // Find owner: highest degree hub
  ownerNodeId = null;
  let ownerDeg = 0;
  for (const n of raw.nodes) {
    const deg = degreeMap[n.id] || 0;
    if (deg > ownerDeg || (deg === ownerDeg && comboMap[n.id] > comboMap[ownerNodeId])) {
      ownerDeg = deg; ownerNodeId = n.id;
    }
  }

  // Infer types from relations
  inferredType = {};
  if (allTypesNull) {
    inferredType[ownerNodeId] = 'owner';
    for (const e of raw.edges) {
      const rel = e.relation || 'RELATES_TO';
      const itype = REL_TO_TYPE[rel] || 'concept';
      if (e.source === ownerNodeId && !inferredType[e.target]) inferredType[e.target] = itype;
      if (e.target === ownerNodeId && !inferredType[e.source]) inferredType[e.source] = itype;
    }
    for (const e of raw.edges) {
      const rel = e.relation || 'RELATES_TO';
      const itype = REL_TO_TYPE[rel] || 'concept';
      if (!inferredType[e.source]) inferredType[e.source] = itype;
      if (!inferredType[e.target]) inferredType[e.target] = itype;
    }
  }

  computeClusters(raw.nodes, raw.edges);

  // Build graphology graph
  graph = buildGraph(raw);

  // Apply visual attributes
  applyVisuals();

  // Run ForceAtlas2 layout
  runFA2(200);

  // Stats
  $('#st-neurons').textContent  = raw.stats?.total_neurons ?? raw.nodes.length;
  $('#st-synapses').textContent = raw.stats?.total_synapses ?? raw.edges.length;
  updateShownCount();

  // Init Sigma renderer
  document.getElementById('sigma-container').style.background = THEME.background;
  initSigma();

  // Re-render after fonts load (prevents bold fallback on first paint)
  document.fonts.ready.then(() => { if (renderer) renderer.refresh(); });

  renderLegend();

  // Fade out loading
  $loading.classList.add('hidden');
}

// ── Boot ─────────────────────────────────────────────────
main().catch(err => {
  console.error('MYCELIUM viz:', err);
  const lt = $loading.querySelector('.load-text');
  lt.textContent = err.message;
  lt.style.color = 'var(--danger)';
});
</script>
